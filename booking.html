<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reserve a table at 京都園 — Premium Hire Yakiniku in Kyoto">
  <title>Reserve — 京都園</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f0f;
      --bg-card: #1c1c1c;
      --accent: #c8a150;
      --text: #f0ead8;
      --text-muted: #a09888;
      --border: rgba(200, 161, 80, 0.15);
      --font-display: "Cormorant Garamond", "Noto Sans JP", serif;
      --font-body: "Noto Sans JP", "Noto Sans SC", "Inter", sans-serif;
    }

    body {
      font-family: var(--font-body);
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .booking-container {
      max-width: 560px;
      margin: 0 auto;
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      transition: color 0.3s;
    }

    .back-link:hover { color: var(--accent); }

    .booking-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .brand-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(200, 161, 80, 0.1);
      border: 1px solid rgba(200, 161, 80, 0.2);
      border-radius: 50px;
      padding: 8px 20px;
      margin-bottom: 1rem;
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .booking-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 2.5rem);
      font-weight: 400;
      letter-spacing: 0.08em;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .booking-subtitle {
      font-size: 1rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    .booking-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      text-align: center;
    }

    .booking-info {
      margin-bottom: 2rem;
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.8;
    }

    .booking-info p {
      margin-bottom: 0.5rem;
    }

    .booking-info strong {
      color: var(--text);
    }

    .reserve-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
      box-shadow: 0 2px 8px rgba(200, 161, 80, 0.25);
    }

    .reserve-button:hover {
      background: #d4b060;
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(200, 161, 80, 0.35);
    }

    .reserve-button:active { transform: translateY(0); }

    .phone-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      margin-top: 1rem;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }

    .phone-button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    @media (max-width: 768px) {
      body { padding: 20px 15px; }
      .booking-card { padding: 2rem 1.5rem; }
    }

    @media (max-width: 568px) {
      .booking-card { padding: 1.75rem 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="booking-container">
    <a href="landing.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to Home
    </a>

    <div class="booking-header">
      <div class="brand-badge">RESERVATION</div>
      <h1 class="booking-title">京都園</h1>
      <p class="booking-subtitle">Reserve your table at Kyotoen</p>
    </div>

    <div class="booking-card">
      <div class="booking-info">
        <p><strong>Completely reservation-only</strong></p>
        <p>Same-day reservations available by phone</p>
        <p style="font-size: 0.85rem;">15:00 – 23:00 &ensp;|&ensp; Irregular holidays</p>
      </div>

      <a href="https://yoyaku.toreta.in/kyotoen-japan/#/" target="_blank" rel="noopener" class="reserve-button">
        Reserve Online
      </a>

      <div class="divider">or</div>

      <a href="tel:0757082923" class="phone-button">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
        </svg>
        Call 075-708-2923
      </a>
    </div>
  </div>
</body>
</html>
